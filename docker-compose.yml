version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: restaurant_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: restaurant_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb+srv://dev:welcomedb@dev.yyqbble.mongodb.net/SmartRestMgmtDB
      - JWT_SECRET=supersecret123
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: restaurant_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data: